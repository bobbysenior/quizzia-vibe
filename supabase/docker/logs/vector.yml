sources:
  docker:
    type: docker_logs
    docker_host: unix:///var/run/docker.sock

transforms:
  supabase_logs:
    type: filter
    inputs: ["docker"]
    condition: |
      contains(string!(.container_name), "supabase")

sinks:
  console:
    type: console
    inputs: ["supabase_logs"]
    encoding:
      codec: json
